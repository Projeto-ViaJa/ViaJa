services:
  app:
    depends_on:
      - db
    build: ./application
    ports:
      - "3333:3333"
    environment:
      DB_HOST: db
      DB_DATABASE: viaja_db
      DB_USER: root
      DB_PASSWORD: 123456
      DB_PORT: 3306
      APP_PORT: 3333
      APP_HOST: 0.0.0.0

  db:
    image: mysql:8.0
    container_name: viaja-mysql
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: viaja_db
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./bd/bd-dev.sql:/docker-entrypoint-initdb.d/01-init.sql

volumes:
  db_data: