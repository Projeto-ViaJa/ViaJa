services:
  app:
    depends_on:
      - db
    build: . # Certifique-se que o Dockerfile está na mesma pasta que este YAML
    container_name: viaja-web
    ports:
      - "3333:3333"
    environment:
      DB_HOST: db            
      DB_DATABASE: viaja_dev 
      DB_USER: root          
      DB_PASSWORD: 123456    
      DB_PORT: 3306          
      APP_PORT: 3333         
      APP_HOST: 0.0.0.0      

  db:
    image: mysql:8.0
    container_name: viaja-mysql
    environment:
      MYSQL_ROOT_PASSWORD: 123456 
      MYSQL_DATABASE: viaja_dev   
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ../bd/bd-dev.sql:/docker-entrypoint-initdb.d/01-init.sql

  jar:
    build: ../dataLoader # <-- APONTA PARA O DOCKERFILE DO JAVA
    container_name: viaja-jar
    depends_on:
      - db
    ports:
      - "8080:8080"
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: viaja_dev
      DB_USER: root
      DB_PASSWORD: 123456

volumes:
  db_data:
