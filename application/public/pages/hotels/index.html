</head>
<body>

    <nav class="navegacao">
      <a href="../dashboard/index.html" class="nav-item">
        <span class="icone-nav">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <rect x="3"  y="3"  width="8" height="8" rx="1"/>
            <rect x="13" y="3"  width="8" height="8" rx="1"/>
            <rect x="3"  y="13" width="8" height="8" rx="1"/>

      </a>

      <a href="../users-management/index.html" class="nav-item">
        <span class="icone-nav">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <circle cx="9" cy="7" r="3.5"/>
            <path d="M2 20c0-3.3 3.1-6 7-6s7 2.7 7 6"/>
            <circle cx="17" cy="8" r="2.5"/>
            <path d="M15.5 20c.2-1.7 1.4-3.1 3-3.8"/>

      <a href="#" class="nav-item ativo">

          </svg>

      </a>

      <a href="../calendario/index.html" class="nav-item">
        <span class="icone-nav">

            <line x1="16" y1="2" x2="16" y2="6"/>
            <line x1="8" y1="2" x2="8" y2="6"/>
            <line x1="3" y1="10" x2="21" y2="10"/>
          </svg>
        </span>
        Calendário
      </a>
    </nav>

    <div class="rodape-menu">
      <a href="../login/index.html" class="nav-item sair">
        <span class="icone-nav">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
        </span>
        Sair
      </a>
    </div>
  </aside>
  <main class="conteudo">
    <div class="cabecalho-pagina">
      <h1 class="titulo-pagina">Gerenciamento de <strong>Hotéis</strong> parceiros</h1>
      <span class="logo-marca"><img src="../../assets/logo.svg" alt=""></span>
    </div>
    <div class="secao-formulario">
      <div class="grade-campos">
        <label class="campo-label">Nome do hotel
          <input class="campo-input" type="text" id="fNome" placeholder=""/>
        </label>
        <label class="campo-label">Cidade
          <input class="campo-input" type="text" id="fCidade" placeholder=""/>
        </label>
        <label class="campo-label">Número
          <input class="campo-input" type="text" id="fNumero" placeholder=""/>
        </label>
      </div>
      <div class="grade-campos-2">
        <label class="campo-label">Email
          <input class="campo-input" type="email" id="fEmail" placeholder=""/>
        </label>
        <label class="campo-label">Rua
          <input class="campo-input" type="text" id="fRua" placeholder=""/>
        </label>
        <label class="campo-label">Estado
          <input class="campo-input" type="text" id="fEstado" placeholder=""/>
        </label>
        <label class="campo-label">CEP
          <input class="campo-input" type="text" id="fCep" placeholder=""/>
        </label>
      </div>
      <div class="grade-campos-3">
        <label class="campo-label">Telefone
          <input class="campo-input" type="text" id="fTelefone" placeholder=""/>
        </label>
        <div class="grupo-botoes-form">
          <button class="botao botao-escuro" onclick="adicionarOuSalvar()">Adicionar</button>
          <button class="botao botao-claro"  onclick="editarSelecionado()">Editar Dados</button>
          <button class="botao botao-claro" onclick="removerSelecionado()">Remover</button>
        </div>
      </div>
    </div>
    <div class="secao-busca">
      <div class="titulo-busca">Pesquisar Hotéis</div>
      <div class="barra-busca">
        <div class="campo-busca-wrap">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/>
            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input class="campo-busca" type="text" placeholder="" id="campoBusca"/>
        </div>
        <select class="select-ordenar" id="selectOrdenar">
          <option value="">Ordenar</option>
          <option value="nome">Nome</option>
          <option value="cidade">Cidade</option>
          <option value="rede">Rede</option>
        </select>
        <button class="botao botao-escuro" onclick="filtrarTabela()">Filtrar</button>
        <button class="botao botao-claro"  onclick="limparFiltro()">Limpar Filtros</button>
      </div>
    </div>
    <div class="wrapper-tabela">
      <table class="tabela-dados">
        <thead>
          <tr>
            <th>Nome</th>
            <th>Rede</th>
            <th>Email</th>
            <th>Telefone</th>
            <th>Cidade</th>
            <th>Estado</th>
            <th>Endereço</th>
            <th class="th-acoes">Ações</th>
          </tr>
        </thead>
        <tbody id="linhasHoteis">
        </tbody>
      </table>
    </div>

  </main>

  <div class="overlay" id="overlay" onclick="fecharModal()"></div>
  <div class="modal" id="modal">
    <div class="modal-cabecalho">
      <h2 class="modal-titulo">Editar Hotel</h2>
      <button class="modal-fechar" onclick="fecharModal()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"/>
          <line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <div class="modal-corpo">
      <div class="modal-grade">
        <label class="campo-label">Nome do hotel
          <input class="campo-input" type="text" id="editNome"/>
        </label>
        <label class="campo-label">Rede
          <input class="campo-input" type="text" id="editRede"/>
        </label>
        <label class="campo-label">Email
          <input class="campo-input" type="email" id="editEmail"/>
        </label>
        <label class="campo-label">Telefone
          <input class="campo-input" type="text" id="editTelefone"/>
        </label>
        <label class="campo-label">Cidade
          <input class="campo-input" type="text" id="editCidade"/>
        </label>
        <label class="campo-label">Estado
          <input class="campo-input" type="text" id="editEstado"/>
        </label>
        <label class="campo-label">Rua
          <input class="campo-input" type="text" id="editRua"/>
        </label>
        <label class="campo-label">Número
          <input class="campo-input" type="text" id="editNumero"/>
        </label>
      </div>
      <label class="campo-label">CEP
        <input class="campo-input" type="text" id="editCep"/>
      </label>
    </div>
    <div class="modal-rodape">
      <button class="botao botao-claro"  onclick="fecharModal()">Cancelar</button>
      <button class="botao botao-escuro" onclick="salvarEdicao()">Salvar</button>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    let hoteis = [];
    let selecionadoId = null;
    let editandoId = null;
    let listaFiltrada = [];

    async function fetchHoteis() {
      try {
        const response = await fetch('/hoteis/listar');
        if (!response.ok) throw new Error('Erro ao buscar hotéis');
        hoteis = await response.json();
        listaFiltrada = [...hoteis];
        renderizar(listaFiltrada);
      } catch (error) {
        console.error(error);
        mostrarToast('Erro ao carregar hotéis.');
      }
    }

    async function cadastrarHotel(dados) {
      try {
        const response = await fetch('/hoteis/cadastrar', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            nomeServer: dados.nome,
            nomeRedeServer: dados.rede || '',
            ruaServer: dados.rua,
            cidadeServer: dados.cidade,
            estadoServer: dados.estado,
            numeroServer: dados.numero,
            emailServer: dados.email,
            telefoneServer: dados.telefone,
            cepServer: dados.cep,
            fkEmpresaServer: 1
          })
        });
        if (!response.ok) throw new Error('Erro ao cadastrar');
        await fetchHoteis();
        mostrarToast('Hotel cadastrado com sucesso!');
      } catch (error) {
        console.error(error);
        mostrarToast('Erro ao cadastrar hotel.');
      }
    }

    async function editarHotel(id, dados) {
      try {
        const response = await fetch('/hoteis/editar', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            idServer: id,
            nomeServer: dados.nome,
            nomeRedeServer: dados.rede || '',
            ruaServer: dados.rua,
            cidadeServer: dados.cidade,
            estadoServer: dados.estado,
            numeroServer: dados.numero,
            emailServer: dados.email,
            telefoneServer: dados.telefone,
            cepServer: dados.cep,
            fkEmpresaServer: 1
          })
        });
        if (!response.ok) throw new Error('Erro ao editar');
        await fetchHoteis();
        mostrarToast('Hotel editado com sucesso!');
      } catch (error) {
        console.error(error);
        mostrarToast('Erro ao editar hotel.');
      }
    }

    async function excluirHotel(id) {
      try {
        const response = await fetch(`/hoteis/excluir/${id}`, { method: 'DELETE' });
        if (!response.ok) throw new Error('Erro ao excluir');
        await fetchHoteis();
        mostrarToast('Hotel excluído com sucesso!');
      } catch (error) {
        console.error(error);
        mostrarToast('Erro ao excluir hotel.');
      }
    }

   function renderizar(lista) {
      const tbody = document.getElementById('linhasHoteis');
      tbody.innerHTML = '';

      if (lista.length === 0) {
        tbody.innerHTML = `<tr><td colspan="8" style="text-align:center;color:var(--cor-texto-fraco);padding:32px">Nenhum hotel encontrado.</td></tr>`;
        return;
      }

      lista.forEach(h => {
        const tr = document.createElement('tr');
        if (selecionadoId === h.id_hotel) tr.classList.add('linha-selecionada');
        tr.style.cursor = 'pointer';
        tr.addEventListener('click', () => selecionarLinha(h.id_hotel, tr));

        tr.innerHTML = `
          <td>${h.nome}</td>
          <td>${h.nome_rede || ''}</td>
          <td>${h.email}</td>
          <td>${h.telefone}</td>
          <td>${h.cidade}</td>
          <td>${h.rua}</td>
          <td class="td-acoes">
            <button class="botao-acao editar"  onclick="event.stopPropagation(); abrirModal(${h.id_hotel})">Editar</button>
            <button class="botao-acao remover" onclick="event.stopPropagation(); excluirHotel(${h.id_hotel})">Remover</button>
          </td>`;
        tbody.appendChild(tr);
      });
    }

   fetchHoteis();

   function selecionarLinha(id, tr) {
      selecionadoId = (selecionadoId === id) ? null : id;
      renderizar(obterListaAtual());
    }

   function obterListaAtual() { return listaFiltrada; }

    function filtrarTabela() {
      const busca   = document.getElementById('campoBusca').value.toLowerCase();
      const ordenar = document.getElementById('selectOrdenar').value;

      listaFiltrada = hoteis.filter(h =>
        Object.values(h).some(v => String(v).toLowerCase().includes(busca))
      );

      if (ordenar) {
        listaFiltrada.sort((a, b) => String(a[ordenar]).localeCompare(String(b[ordenar])));
      }

      renderizar(listaFiltrada);
    }

    function limparFiltro() {
      document.getElementById('campoBusca').value = '';
      document.getElementById('selectOrdenar').value = '';
      listaFiltrada = [...hoteis];
      renderizar(listaFiltrada);
    }

    document.getElementById('campoBusca').addEventListener('keyup', e => {
      if (e.key === 'Enter') filtrarTabela();
    });

    function lerFormulario() {
      return {
        nome:     document.getElementById('fNome').value.trim(),
        rede:     '',
        cidade:   document.getElementById('fCidade').value.trim(),
        numero:   document.getElementById('fNumero').value.trim(),
        rua:      document.getElementById('fRua').value.trim(),
        estado:   document.getElementById('fEstado').value.trim(),
        cep:      document.getElementById('fCep').value.trim(),
        telefone: document.getElementById('fTelefone').value.trim(),
        email:    document.getElementById('fEmail').value.trim(),
      };
    }

    function limparFormulario() {
      ['fNome','fEmail','fCidade','fNumero','fRua','fEstado','fCep','fTelefone'].forEach(id => {
        document.getElementById(id).value = '';
      });
    }

    function adicionarOuSalvar() {
      const dados = lerFormulario();
      if (!dados.nome || !dados.email || !dados.cidade || !dados.rua || !dados.estado || !dados.numero || !dados.cep || !dados.telefone) {
        mostrarToast('Preencha todos os campos obrigatórios.');
        return;
      }
      cadastrarHotel(dados);
      limparFormulario();
    }
    function editarSelecionado() {
      if (!selecionadoId) { mostrarToast('Selecione um hotel na tabela primeiro.'); return; }
      abrirModal(selecionadoId);
    }

    function removerSelecionado() {
      if (!selecionadoId) { mostrarToast('Selecione um hotel na tabela primeiro.'); return; }
      excluirHotel(selecionadoId);
    }

    function abrirModal(id) {
      const h = hoteis.find(x => x.id_hotel === id);
      if (!h) return;
      editandoId = id;
      document.getElementById('editNome').value     = h.nome;
      document.getElementById('editRede').value     = h.nome_rede || '';
      document.getElementById('editEmail').value    = h.email;
      document.getElementById('editTelefone').value = h.telefone;
      document.getElementById('editCidade').value   = h.cidade;
      document.getElementById('editEstado').value   = h.estado;
      document.getElementById('editRua').value      = h.rua;
      document.getElementById('editNumero').value   = h.numero;
      document.getElementById('editCep').value      = h.cep;
      document.getElementById('modal').classList.add('aberto');
      document.getElementById('overlay').classList.add('aberto');
    }

    function fecharModal() {
      document.getElementById('modal').classList.remove('aberto');
      document.getElementById('overlay').classList.remove('aberto');
      editandoId = null;
    }

    function salvarEdicao() {
      const dados = {
        nome:     document.getElementById('editNome').value.trim(),
        rede:     document.getElementById('editRede').value.trim(),
        email:    document.getElementById('editEmail').value.trim(),
        telefone: document.getElementById('editTelefone').value.trim(),
        cidade:   document.getElementById('editCidade').value.trim(),
        estado:   document.getElementById('editEstado').value.trim(),
        rua:      document.getElementById('editRua').value.trim(),
        numero:   document.getElementById('editNumero').value.trim(),
        cep:      document.getElementById('editCep').value.trim(),
      };
      if (!dados.nome || !dados.email || !dados.cidade || !dados.rua || !dados.estado || !dados.numero || !dados.cep || !dados.telefone) {
        mostrarToast('Preencha todos os campos obrigatórios.');
        return;
      }
      editarHotel(editandoId, dados);
      fecharModal();
    }

    function mostrarToast(mensagem) {
      const toast = document.getElementById('toast');
      toast.textContent = mensagem;
      toast.classList.add('visivel');
      setTimeout(() => toast.classList.remove('visivel'), 3000);
    }
  </script>

</body>
</html>
