  <main class="conteudo">
    <div class="cabecalho-pagina">
      <div>
        <h1 class="titulo-pagina">Calendário de Eventos e <strong>Sazonalidade</strong></h1>
        <p style="font-size:11.5px;color:var(--text-muted);margin-top:4px;">Selecione o(s) dia(s) e adicione um evento ou marcador</p>
      </div>
      <span><img src="../../assets/logo.svg" alt=""></span>
    </div>
    <div class="cal-controls">
      <span class="badge-ano" id="badgeAno">2026</span>

      <div class="legenda-item" id="legenda-container"></div>

      <div class="nav-mes">
        <button class="nav-mes-btn" onclick="mudarMes(-1)">&#8249;</button>
        <span class="nome-mes" id="nomeMes">Janeiro</span>
        <button class="nav-mes-btn" onclick="mudarMes(1)">&#8250;</button>
      </div>
    </div>
    <div class="wrapper-cal">
        <div id="calendar"></div>
    </div>
  </main>
  <div class="overlay" id="overlay" onclick="fecharModal()"></div>
  <div class="modal" id="modal">
    <div class="modal-cabecalho">
      <div>
        <div class="modal-titulo" id="modalTitulo">01 de Janeiro de 2026</div>
        <div class="modal-data-sub" id="modalSub">Nenhum marcador ativo</div>
      </div>
      <button class="modal-fechar" onclick="fecharModal()">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <div class="modal-corpo">
      <div>
        <div class="secao-titulo">Marcador do Período</div>
        <div id="marcadorExistente" style="display:none;" class="marcador-existente">
          <div class="marcador-existente-titulo">Marcador Ativo</div>
          <div class="marcador-info">
            <div class="marcador-cor-circle" id="marcadorCorCircle"></div>
            <span class="marcador-nome" id="marcadorNomeLabel"></span>
            <div class="marcador-acoes">
              <button class="btn-mini" onclick="editarMarcador()">Editar</button>
              <button class="btn-mini danger" onclick="removerMarcador()">Remover</button>
            </div>
          </div>
        </div>
        <div id="marcadorForm">
          <div class="evento-form" style="gap:12px;">
            <label class="campo-label">Nome do Marcador
              <input class="campo-input" type="text" id="marcadorNome" placeholder="ex: Período de Alta"/>
            </label>
            <label class="campo-label">Cor
              <div class="paleta" id="paletaCores"></div>
            </label>
            <div style="display:flex;justify-content:flex-end;">
              <button class="botao botao-escuro" style="font-size:11px;padding:6px 14px;" onclick="salvarMarcador()">Aplicar Marcador</button>
            </div>
          </div>
        </div>
      </div>
      <div>
        <div class="secao-titulo">Eventos do Dia</div>
        <div class="evento-form">
          <div id="eventosList"></div>
          <div class="add-evento-row">
            <input class="campo-input" type="text" id="novoEventoNome" placeholder="Nome do evento…"/>
            <select class="campo-input" id="novoEventoCor" style="width:90px;">
              <option value="#6c63ff">Roxo</option>
              <option value="#4da6ff">Azul</option>
              <option value="#4caf82">Verde</option>
              <option value="#f5c842">Amarelo</option>
              <option value="#ff5e5e">Vermelho</option>
              <option value="#ff9f43">Laranja</option>
            </select>
            <button class="botao botao-escuro" style="white-space:nowrap;font-size:11px;padding:7px 12px;" onclick="adicionarEvento()">+ Add</button>
          </div>
        </div>
      </div>
    </div>

    <div class="modal-rodape">
      <button class="botao botao-claro" onclick="fecharModal()">Fechar</button>
      <button class="botao botao-escuro" onclick="fecharModal()">Salvar</button>
    </div>
  </div>

  <script>
document.addEventListener('DOMContentLoaded', function () {
  let eventos = [];
  let marcadores = {};

  const calendarEl = document.getElementById('calendar');

  const calendar = new FullCalendar.Calendar(calendarEl, {
    initialView: 'dayGridMonth',
    locale: 'pt-br',
    height: 'auto',

    headerToolbar: {
      left: 'prev,next today',
      center: 'title',
      right: 'dayGridMonth,timeGridWeek,timeGridDay'
    },

    selectable: true,
    editable: true,

    dateClick: function(info) {
      abrirModalCriar(info.dateStr);
    },
    eventClick: function(info) {
      abrirModalEditar(info.event);
    },

    events: eventos
  });

  calendar.render();
  function abrirModalCriar(data) {
    const nome = prompt("Nome do evento:");
    if (!nome) return;

    const cor = prompt("Cor (hex):", "#6c63ff");

    const novoEvento = {
      id: String(Date.now()),
      title: nome,
      start: data,
      color: cor
    };
    eventos.push(novoEvento);
    calendar.addEvent(novoEvento);
    salvarNoBackend(novoEvento, 'POST');
  }
  function abrirModalEditar(event) {
    const novoNome = prompt("Editar nome:", event.title);
    if (!novoNome) return;

    const novaCor = prompt("Editar cor:", event.backgroundColor);

    event.setProp('title', novoNome);
    event.setProp('color', novaCor);
  }});
</script>
</body>
