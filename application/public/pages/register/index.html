
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ViaJá - Criar Conta</title>
    <link rel="stylesheet" href="../../css/reset.css">
    <link rel="stylesheet" href="../../css/register/style.css">
</head>
<body>
    <div class="main-container">
        <div class="form-container">
            <div class="logo-container">
                <a href="../../index.html">
                    <img src="../../assets/logo.svg" alt="">
                </a>
            </div>
            <div class="form-sub-container">
                <div class="text-container">
                    <h2>Crie sua Conta</h2>
                    <p>Crie sua conta utilizando seu email e senha.</p>
                </div>
                <form class="signup-form">
                    <div class="input-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" required>
                    </div>
                    <div class="input-group">
                        <label for="password">Senha</label>
                        <input type="password" id="password" name="password" required>
                    </div>
                    <div class="input-group">
                        <label for="confirm-password">Confirme a senha</label>
                        <input type="password" id="confirm-password" name="confirm-password" required>
                    </div>
                    <div class="remember-container">
                        <div>
                            <input type="checkbox" id="remember" name="remember">
                            <label for="remember">Lembrar de mim</label>
                        </div>
                        <div>
                            <a href="#">Esqueceu sua senha?</a>
                        </div>
                    </div>
                    <button type="submit" class="btn-signup">Entrar</button>
                    <p class="already-account">Já possui uma conta? <a href="../login/index.html">Entrar agora.</a></p>
                </form>
            </div>
            <div class="footer">
                <span>Copyright 2026 ViaJá.</span>
            </div>
        </div>
        <div class="image-container">
            <div class="image-sub-container">
                <a class="inicio-link" href="../../index.html">Início</a>
            </div>
        </div>
    </div>
</body>
</html>
